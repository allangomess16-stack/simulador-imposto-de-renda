<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estrategista IRPF 2026 | Gestão Fiscal Pro</title>
    <style>
        :root {
            --bg-dark: #0b0f19; --card-bg: #151c2c; --primary: #3b82f6;
            --secondary: #10b981; --text-main: #f1f5f9; --text-dim: #94a3b8;
            --border: #2d3748; --accent: #f59e0b;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 10px;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper { 
            max-width: 1200px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow-x: hidden;
        }

        .grid-main { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 15px; 
        }

        @media (min-width: 768px) {
            .grid-main { grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); }
            .wrapper { padding: 40px; }
        }

        .card { padding: 20px; border-radius: 12px; background: rgba(30, 41, 59, 0.3); border: 1px solid var(--border); }
        .card-h { font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; display: block; font-size: 0.8rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        
        label { display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; padding: 12px; background: #0b0f19; border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        
        .actions { display: flex; flex-direction: column; gap: 10px; margin: 25px 0; }
        @media (min-width: 600px) { .actions { flex-direction: row; } }

        .btn-calc { flex: 3; padding: 18px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-clear { flex: 1; padding: 18px; background: transparent; color: #ef4444; border: 1px solid #ef4444; border-radius: 8px; font-weight: 600; cursor: pointer; text-transform: uppercase; }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 10px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #242f44; font-size: 0.85rem; }
        th { color: var(--text-dim); text-transform: uppercase; font-size: 0.7rem; }
        
        .comparison-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; display: none; }
        @media (min-width: 768px) { .comparison-grid { grid-template-columns: 1fr 1fr; } }
        
        .comp-card { background: #1a2234; padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .val-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.85rem; border-bottom: 1px solid #242f44; }
        .val-total { font-weight: bold; font-size: 1.3rem; color: var(--secondary); margin-top: 20px; padding-top: 10px; border-top: 2px solid #242f44; text-align: right; }

        .opt-panel { background: #1a2234; border: 1px solid var(--accent); padding: 25px; border-radius: 12px; margin-top: 30px; display: none; }
        .opt-header { color: var(--accent); font-weight: 800; font-size: 1rem; margin-bottom: 20px; text-transform: uppercase; }
        .val-mensal { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1 style="text-align:center; font-size: 1.5rem; margin-bottom: 40px;">Simulador Fiscal Estratégico 2026</h1>
    
    <div class="grid-main">
        <div class="card">
            <span class="card-h">📈 Dados do Informe (Quadro 3)</span>
            <label>Rendimentos Brutos (Linha 01)</label>
            <input type="text" id="renda" value="82.754,99">
            <label>INSS Oficial (Linha 02)</label>
            <input type="text" id="inss" value="9.309,88">
            <label>IRRF Retido (Linha 05)</label>
            <input type="text" id="irrf" value="8.247,52">
            <label>13º Salário (Exclusivo)</label>
            <input type="text" id="decimo" placeholder="0,00">
        </div>

        <div class="card">
            <span class="card-h">👤 Titular</span>
            <label>Saúde Anual</label>
            <input type="text" id="saudeTit" placeholder="0,00">
            <label>Educação Anual</label>
            <input type="text" id="eduTit" placeholder="0,00">
        </div>

        <div class="card">
            <span class="card-h">👥 Dependentes</span>
            <div id="depContainer"></div>
            <button class="btn-add" onclick="addDependente()">+ NOVO DEPENDENTE</button>
        </div>
    </div>

    <div class="actions">
        <button class="btn-calc" onclick="processar()">Analisar Eficiência</button>
        <button class="btn-clear" onclick="limparTudo()">Limpar Tudo</button>
    </div>

    <div id="resContainer" class="comparison-grid">
        <div class="comp-card">
            <h3 style="color:var(--primary); font-size:0.9rem; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:5px;">CÁLCULO COMPLETO</h3>
            <div id="detalheCompleto"></div>
        </div>
        <div class="comp-card">
            <h3 style="color:var(--primary); font-size:0.9rem; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:5px;">CÁLCULO SIMPLIFICADO</h3>
            <div id="detalheSimplificado"></div>
        </div>
    </div>

    <div id="optPanel" class="opt-panel">
        <div class="opt-header">🎯 Impacto Mensal e Planejamento de Sobras</div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr><th>Beneficiário</th><th>Sobra Anual</th><th>Impacto Mensal</th><th>Ganho na Restituição</th></tr>
                </thead>
                <tbody id="optBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let depCount = 0;
    const TETO_EDU = 3561.50;
    const DED_DEP_FIXO = 2275.08;

    function addDependente() {
        depCount++;
        const div = document.createElement('div');
        div.className = 'dep-item';
        div.innerHTML = `
            <div style="font-size: 0.7rem; color: var(--primary); font-weight: bold; margin: 10px 0 5px 0;">DEPENDENTE 0${depCount}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Saúde</label><input type="text" class="dep-saude" placeholder="0,00"></div>
                <div><label>Educação</label><input type="text" class="dep-edu" placeholder="0,00"></div>
            </div>
        `;
        document.getElementById('depContainer').appendChild(div);
    }

    function parseBr(val) {
        if (!val) return 0;
        let clean = val.toString().replace(/[R$\s]/g, '').replace(/\./g, '').replace(',', '.');
        return parseFloat(clean) || 0;
    }

    function fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function obterFaixa(base) {
        if (base <= 28467.20) return { aliq: 0, ded: 0 };
        if (base <= 33919.80) return { aliq: 0.075, ded: 2135.04 };
        if (base <= 45012.60) return { aliq: 0.15, ded: 4679.03 };
        if (base <= 55976.16) return { aliq: 0.225, ded: 8054.98 };
        return { aliq: 0.275, ded: 10853.79 };
    }

    function processar() {
        const renda = parseBr(document.getElementById('renda').value);
        const inss = parseBr(document.getElementById('inss').value);
        const irrf = parseBr(document.getElementById('irrf').value);
        const saudeTit = parseBr(document.getElementById('saudeTit').value);
        const eduTitReal = parseBr(document.getElementById('eduTit').value);
        const eduTitEfetiva = Math.min(eduTitReal, TETO_EDU);

        let saudeDepTotal = 0, eduDepEfetivaTotal = 0, optHtml = "";

        // Otimização Titular
        let sobraTit = Math.max(0, TETO_EDU - eduTitReal);
        optHtml += `<tr><td>Titular</td><td>${fmt(sobraTit)}</td><td class="val-mensal">${fmt(sobraTit/12)}</td><td>${fmt(sobraTit * 0.275)}</td></tr>`;

        // Dependentes
        document.querySelectorAll('.dep-item').forEach((item, idx) => {
            let s = parseBr(item.querySelector('.dep-saude').value);
            let e = parseBr(item.querySelector('.dep-edu').value);
            saudeDepTotal += s;
            eduDepEfetivaTotal += Math.min(e, TETO_EDU);
            let sobra = Math.max(0, TETO_EDU - e);
            optHtml += `<tr><td>Dependente 0${idx+1}</td><td>${fmt(sobra)}</td><td class="val-mensal">${fmt(sobra/12)}</td><td>${fmt(sobra * 0.275)}</td></tr>`;
        });

        const totalDeducoes = inss + saudeTit + saudeDepTotal + eduTitEfetiva + eduDepEfetivaTotal + (depCount * DED_DEP_FIXO);
        
        // Resultados Completo
        const baseC = Math.max(0, renda - totalDeducoes);
        const fC = obterFaixa(baseC);
        const impC = Math.max(0, (baseC * fC.aliq) - fC.ded);
        document.getElementById('detalheCompleto').innerHTML = `
            <div class="val-row"><span>Rendimentos Brutos:</span><span>${fmt(renda)}</span></div>
            <div class="val-row"><span>Total Deduções:</span><span>${fmt(totalDeducoes)}</span></div>
            <div class="val-row" style="background:rgba(59,130,246,0.1)"><span>Base de Cálculo:</span><span style="font-weight:bold">${fmt(baseC)}</span></div>
            <div class="val-row"><span>Imposto Devido:</span><span>${fmt(impC)}</span></div>
            <div class="val-total">Restituição: ${fmt(irrf - impC)}</div>
        `;

        // Resultados Simplificado
        const baseS = Math.max(0, renda - Math.min(renda * 0.20, 16754.34));
        const fS = obterFaixa(baseS);
        const impS = Math.max(0, (baseS * fS.aliq) - fS.ded);
        document.getElementById('detalheSimplificado').innerHTML = `
            <div class="val-row"><span>Base de Cálculo:</span><span>${fmt(baseS)}</span></div>
            <div class="val-total">Restituição: ${fmt(irrf - impS)}</div>
        `;

        document.getElementById('optBody').innerHTML = optHtml;
        document.getElementById('resContainer').style.display = 'grid';
        document.getElementById('optPanel').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function limparTudo() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.getElementById('depContainer').innerHTML = "";
        depCount = 0;
        document.getElementById('resContainer').style.display = 'none';
        document.getElementById('optPanel').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
