<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrategista IRPF 2026 | Gestão de Orçamento</title>
    <style>
        :root {
            --bg-dark: #0b0f19; --card-bg: #151c2c; --primary: #3b82f6;
            --secondary: #10b981; --text-main: #f1f5f9; --text-dim: #94a3b8;
            --border: #2d3748; --accent: #f59e0b;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .wrapper { max-width: 1200px; margin: auto; background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 24px; }
        .card { padding: 24px; border-radius: 12px; background: rgba(30, 41, 59, 0.3); border: 1px solid var(--border); }
        .card-h { font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; display: block; font-size: 0.85rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; padding: 10px; background: #0b0f19; border: 1px solid var(--border); border-radius: 6px; color: white; margin-bottom: 12px; box-sizing: border-box; }
        
        .dep-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; margin-bottom: 20px; width: 100%; }
        
        .actions { display: flex; gap: 15px; margin: 30px 0; }
        .btn-calc { flex: 3; padding: 18px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-clear { flex: 1; padding: 18px; background: transparent; color: #ef4444; border: 1px solid #ef4444; border-radius: 8px; font-weight: 600; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-clear:hover { background: #ef4444; color: white; }

        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; display: none; }
        .comp-card { background: #1a2234; padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .val-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.85rem; border-bottom: 1px solid #242f44; }
        .val-total { font-weight: bold; font-size: 1.3rem; color: var(--secondary); margin-top: 20px; padding-top: 10px; border-top: 2px solid #242f44; text-align: right; }
        
        .opt-panel { background: #1a2234; border: 1px solid var(--accent); padding: 25px; border-radius: 12px; margin-top: 30px; display: none; }
        .opt-header { color: var(--accent); font-weight: 800; font-size: 1rem; margin-bottom: 20px; text-transform: uppercase; }
        .opt-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .opt-table th { text-align: left; color: var(--text-dim); font-size: 0.7rem; padding: 10px; border-bottom: 1px solid var(--border); }
        .opt-table td { padding: 10px; border-bottom: 1px solid #242f44; font-size: 0.85rem; }
        .val-mensal { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1 style="text-align:center; font-size: 1.6rem; margin-bottom: 40px;">Estrategista IRPF 2026</h1>
    
    <div class="grid-main">
        <div class="card">
            <span class="card-h">📈 Quadro de Rendimentos</span>
            <label>Rendimentos Tributáveis (Anual)</label>
            <input type="text" id="renda" value="82.754,99">
            <label>Previdência Oficial (Linha 02)</label>
            <input type="text" id="inss" value="9.309,88">
            <label>Imposto Retido (Linha 05)</label>
            <input type="text" id="irrf" value="8.247,52">
            <label>PGBL (Previdência Privada)</label>
            <input type="text" id="pgbl" placeholder="0,00">
        </div>

        <div class="card">
            <span class="card-h">👤 Titular</span>
            <label>Educação Anual</label>
            <input type="text" id="eduTit" placeholder="0,00">
            <label>Saúde Anual</label>
            <input type="text" id="saudeTit" placeholder="0,00">
        </div>

        <div class="card">
            <span class="card-h">👥 Dependentes</span>
            <div id="depContainer"></div>
            <button class="btn-add" onclick="addDependente()">+ NOVO DEPENDENTE</button>
        </div>
    </div>

    <div class="actions">
        <button class="btn-calc" onclick="processar()">Analisar Comparativo</button>
        <button class="btn-clear" onclick="limparTudo()">Limpar Todos os Campos</button>
    </div>

    <div id="resContainer" class="comparison-grid">
        <div id="boxCompleto" class="comp-card">
            <h3 style="color:var(--primary); font-size:0.9rem; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:5px;">DEDUÇÕES LEGAIS (COMPLETO)</h3>
            <div id="detalheCompleto"></div>
        </div>
        <div id="boxSimplificado" class="comp-card">
            <h3 style="color:var(--primary); font-size:0.9rem; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:5px;">DESCONTO SIMPLIFICADO</h3>
            <div id="detalheSimplificado"></div>
        </div>
    </div>

    <div id="optPanel" class="opt-panel">
        <div class="opt-header">🎯 Impacto no Orçamento e Planejamento de Sobras</div>
        <table class="opt-table">
            <thead>
                <tr><th>Beneficiário</th><th>Sobra Anual (Teto)</th><th>Mensal p/ Teto</th><th>Ganho IR Anual</th></tr>
            </thead>
            <tbody id="optBody"></tbody>
        </table>
    </div>
</div>

<script>
    let depCount = 0;
    const TETO_EDU = 3561.50;
    const DED_DEP_FIXO = 2275.08;

    function addDependente() {
        depCount++;
        const div = document.createElement('div');
        div.className = 'dep-item';
        div.innerHTML = `
            <div style="font-size: 0.7rem; color: var(--primary); font-weight: bold; margin-bottom: 5px;">DEPENDENTE 0${depCount}</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Saúde</label><input type="text" class="dep-saude" placeholder="0,00"></div>
                <div><label>Educação</label><input type="text" class="dep-edu" placeholder="0,00"></div>
            </div>
        `;
        document.getElementById('depContainer').appendChild(div);
    }

    function parseBr(val) {
        if (!val) return 0;
        let clean = val.toString().replace(/[R$\s]/g, '').replace(/\./g, '').replace(',', '.');
        return parseFloat(clean) || 0;
    }

    function fmt(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function obterFaixa(base) {
        if (base <= 28467.20) return { aliq: 0, ded: 0 };
        if (base <= 33919.80) return { aliq: 0.075, ded: 2135.04 };
        if (base <= 45012.60) return { aliq: 0.15, ded: 4679.03 };
        if (base <= 55976.16) return { aliq: 0.225, ded: 8054.98 };
        return { aliq: 0.275, ded: 10853.79 };
    }

    function processar() {
        const renda = parseBr(document.getElementById('renda').value);
        const inss = parseBr(document.getElementById('inss').value);
        const irrf = parseBr(document.getElementById('irrf').value);
        const saudeTit = parseBr(document.getElementById('saudeTit').value);
        const eduTitReal = parseBr(document.getElementById('eduTit').value);
        const eduTitEfetiva = Math.min(eduTitReal, TETO_EDU);

        let saudeDepTotal = 0, eduDepEfetivaTotal = 0, optHtml = "";

        let sobraTit = Math.max(0, TETO_EDU - eduTitReal);
        optHtml += `<tr><td>Titular</td><td>${fmt(sobraTit)}</td><td class="val-mensal">${fmt(sobraTit/12)}</td><td>${fmt(sobraTit * 0.275)}</td></tr>`;

        document.querySelectorAll('.dep-item').forEach((item, idx) => {
            let s = parseBr(item.querySelector('.dep-saude').value);
            let e = parseBr(item.querySelector('.dep-edu').value);
            saudeDepTotal += s;
            eduDepEfetivaTotal += Math.min(e, TETO_EDU);
            let sobra = Math.max(0, TETO_EDU - e);
            optHtml += `<tr><td>Dependente 0${idx+1}</td><td>${fmt(sobra)}</td><td class="val-mensal">${fmt(sobra/12)}</td><td>${fmt(sobra * 0.275)}</td></tr>`;
        });

        const totalDeducoes = inss + saudeTit + saudeDepTotal + eduTitEfetiva + eduDepEfetivaTotal + (depCount * DED_DEP_FIXO);
        
        const baseC = Math.max(0, renda - totalDeducoes);
        const faixaC = obterFaixa(baseC);
        const impDevidoC = (baseC * faixaC.aliq) - faixaC.ded;
        
        document.getElementById('detalheCompleto').innerHTML = `
            <div class="val-row"><span>Rendimentos Totais:</span><span>${fmt(renda)}</span></div>
            <div class="val-row"><span>Total Deduções:</span><span>${fmt(totalDeducoes)}</span></div>
            <div class="val-row" style="background:rgba(59,130,246,0.1)"><span>Base de Cálculo:</span><span style="font-weight:bold">${fmt(baseC)}</span></div>
            <div class="val-row"><span>Alíquota Aplicada:</span><span>${(faixaC.aliq*100).toFixed(1)}%</span></div>
            <div class="val-total">Restituição: ${fmt(irrf - Math.max(0, impDevidoC))}</div>
        `;

        const descS = Math.min(renda * 0.20, 16754.34);
        const baseS = Math.max(0, renda - descS);
        const faixaS = obterFaixa(baseS);
        const impDevidoS = (baseS * faixaS.aliq) - faixaS.ded;

        document.getElementById('detalheSimplificado').innerHTML = `
            <div class="val-row"><span>Base de Cálculo:</span><span>${fmt(baseS)}</span></div>
            <div class="val-total">Restituição: ${fmt(irrf - Math.max(0, impDevidoS))}</div>
        `;

        document.getElementById('optBody').innerHTML = optHtml;
        document.getElementById('resContainer').style.display = 'grid';
        document.getElementById('optPanel').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // NOVA FUNÇÃO DE LIMPEZA REAL
    function limparTudo() {
        // Limpa todos os inputs de texto
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.value = "";
        });

        // Remove todos os dependentes adicionados
        document.getElementById('depContainer').innerHTML = "";
        depCount = 0;

        // Esconde os painéis de resultado
        document.getElementById('resContainer').style.display = 'none';
        document.getElementById('optPanel').style.display = 'none';

        // Volta para o topo
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
